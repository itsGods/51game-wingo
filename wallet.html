<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet – 51Game</title>
    <link rel="icon" href="https://ossimg.51game-game.com/51game/other/h5setting_20240530145344k6oc.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        /* ── Wallet-specific ── */
        .balance-card {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, #f5a623 0%, #e08800 100%);
            color: #fff; border-radius: 20px; padding: 24px 20px 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(245,166,35,0.35);
        }
        .balance-card::before {
            content: ''; position: absolute; right: -30px; top: -30px;
            width: 130px; height: 130px; background: rgba(255,255,255,0.12); border-radius: 50%;
        }
        .balance-card::after {
            content: ''; position: absolute; right: 20px; top: 42px;
            width: 80px; height: 80px; background: rgba(255,255,255,0.08); border-radius: 50%;
        }
        .balance-label { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
        .balance-amount { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; position: relative; z-index: 1; }
        .balance-uid { font-size: 11px; opacity: 0.7; margin-top: 4px; display:flex; align-items:center; gap:6px; }
        .copy-uid-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            border-radius: 6px; padding: 2px 7px; font-size: 10px; cursor: pointer;
        }
        .balance-actions { display: flex; gap: 10px; margin-top: 18px; }
        .balance-actions .bal-btn {
            flex: 1; padding: 11px; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; border: none;
            transition: transform 0.15s;
        }
        .bal-btn:active { transform: scale(0.96); }
        .bal-btn-deposit  { background: rgba(46,213,115,0.85); color: #fff; }
        .bal-btn-withdraw { background: rgba(255,71,87,0.85); color: #fff; }

        /* ── Stats summary ── */
        .wallet-stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 16px;
        }
        .wstat-card {
            background: var(--card); border-radius: 14px;
            padding: 14px 10px; text-align: center;
            box-shadow: var(--shadow);
        }
        .wstat-val { font-size: 15px; font-weight: 800; }
        .wstat-lbl { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
        .wstat-card.won  .wstat-val { color: var(--green); }
        .wstat-card.dep  .wstat-val { color: #4f46e5; }
        .wstat-card.bet  .wstat-val { color: var(--accent); }

        /* ── Transaction filter ── */
        .tx-filter-row {
            display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px;
            padding-bottom: 4px; scrollbar-width: none;
        }
        .tx-filter-row::-webkit-scrollbar { display: none; }
        .tx-filter-btn {
            padding: 7px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 600; white-space: nowrap;
            border: 1.5px solid var(--border);
            background: #fff; color: var(--text);
            transition: all 0.15s; cursor: pointer;
        }
        .tx-filter-btn.active {
            background: var(--primary); border-color: var(--primary); color: #fff;
        }

        /* ── Sparkline ── */
        .sparkline-wrap {
            padding: 0 20px 16px;
            display: flex; align-items: flex-end; gap: 4px;
            height: 40px;
        }
        .spark-bar {
            flex: 1; border-radius: 3px 3px 0 0;
            min-height: 4px;
            transition: height 0.5s ease;
        }
        .spark-bar.up   { background: linear-gradient(180deg,#2ed573,#26b85b); }
        .spark-bar.down { background: linear-gradient(180deg,#ff4757,#d63031); }
        .spark-bar.neutral { background: #e0e0e0; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center; padding: 48px 24px;
        }
        .empty-icon { font-size: 52px; margin-bottom: 14px; }
        .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .empty-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

        /* ── Chip active state ── */
        .chip.selected { border-color: var(--primary); background: #fff8ec; color: var(--primary-dark); }

        /* ── Wallet page layout ── */
        .wallet-header-row {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>

<!-- Page Header -->
<div class="page-header">
    <a href="index.html" class="back-btn">‹</a>
    <h1>My Wallet</h1>
    <div style="width:36px"></div>
</div>

<div class="page-content">

    <!-- Balance Card -->
    <div class="balance-card anim-fade-up">
        <div class="balance-label">💼 Total Balance</div>
        <div class="balance-amount" id="balanceDisplay">₹0.00</div>
        <div class="balance-uid">
            <span id="uidDisplay"></span>
            <button class="copy-uid-btn" id="copyUidBtn" onclick="copyUID()">Copy</button>
        </div>
        <div class="balance-actions">
            <button class="bal-btn bal-btn-deposit" onclick="openSheet('deposit')">⬇ Deposit</button>
            <button class="bal-btn bal-btn-withdraw" onclick="openSheet('withdraw')">⬆ Withdraw</button>
        </div>
    </div>

    <!-- Wallet Stats Summary -->
    <div class="wallet-stats anim-fade-up delay-1">
        <div class="wstat-card won">
            <div class="wstat-val" id="totalWon">₹0</div>
            <div class="wstat-lbl">Total Won</div>
        </div>
        <div class="wstat-card dep">
            <div class="wstat-val" id="totalDep">₹0</div>
            <div class="wstat-lbl">Deposited</div>
        </div>
        <div class="wstat-card bet">
            <div class="wstat-val" id="totalBet">₹0</div>
            <div class="wstat-lbl">Total Bet</div>
        </div>
    </div>

    <!-- Quick Deposit Chips -->
    <div class="card anim-fade-up delay-2" style="margin-bottom:16px">
        <div class="card-header">
            <span>⚡ Quick Deposit</span>
        </div>
        <div class="card-body">
            <div class="chip-row" id="quickChips">
                <button class="chip" onclick="quickDeposit(100, this)">₹100</button>
                <button class="chip" onclick="quickDeposit(500, this)">₹500</button>
                <button class="chip" onclick="quickDeposit(1000, this)">₹1K</button>
                <button class="chip" onclick="quickDeposit(5000, this)">₹5K</button>
                <button class="chip" onclick="quickDeposit(10000, this)">₹10K</button>
            </div>
        </div>
    </div>

    <!-- Balance Sparkline -->
    <div class="card anim-fade-up delay-3" style="margin-bottom:16px">
        <div class="card-header">
            <span>📈 Balance History</span>
            <span id="balanceTrend" style="font-size:12px;color:var(--green)"></span>
        </div>
        <div class="sparkline-wrap" id="sparkline"></div>
    </div>

    <!-- Transaction History -->
    <div class="card anim-fade-up delay-4">
        <div class="card-header wallet-header-row">
            <span>📋 Transactions</span>
            <span id="txCountLabel" style="font-size:12px;color:var(--text-secondary)"></span>
        </div>
        <!-- Filter tabs -->
        <div style="padding: 8px 16px 0">
            <div class="tx-filter-row" id="txFilters">
                <button class="tx-filter-btn active" onclick="setFilter('all', this)">All</button>
                <button class="tx-filter-btn" onclick="setFilter('win', this)">🏆 Wins</button>
                <button class="tx-filter-btn" onclick="setFilter('deposit', this)">💳 Deposits</button>
                <button class="tx-filter-btn" onclick="setFilter('bet', this)">🎮 Bets</button>
                <button class="tx-filter-btn" onclick="setFilter('withdraw', this)">⬆ Withdraws</button>
                <button class="tx-filter-btn" onclick="setFilter('bonus', this)">🎁 Bonuses</button>
            </div>
        </div>
        <div id="txList" style="padding: 0 20px 8px"></div>
    </div>

</div>

<!-- Bottom Tabs -->
<nav class="tab-bar">
    <a class="tab-item" href="home.html"><span class="tab-icon">🏠</span><span>Home</span></a>
    <a class="tab-item" href="index.html"><span class="tab-icon">🎮</span><span>Game</span></a>
    <a class="tab-item active" href="wallet.html"><span class="tab-icon">💳</span><span>Wallet</span></a>
    <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span>Profile</span></a>
</nav>

<!-- Deposit Sheet -->
<div class="modal-overlay" id="depositSheet">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">💰 Deposit Funds</div>
        <div class="field-group">
            <div class="field-label">Amount (₹)</div>
            <input class="field-input" type="number" id="depositAmount" placeholder="Enter amount" min="10" max="100000">
        </div>
        <div class="chip-row" style="margin-bottom:16px">
            <button class="chip" onclick="setDepAmt(100, this)">₹100</button>
            <button class="chip" onclick="setDepAmt(500, this)">₹500</button>
            <button class="chip" onclick="setDepAmt(1000, this)">₹1K</button>
            <button class="chip" onclick="setDepAmt(5000, this)">₹5K</button>
        </div>
        <div class="field-group">
            <div class="field-label">Payment Method</div>
            <select class="field-input" id="depositMethod">
                <option value="upi">📱 UPI</option>
                <option value="bank">🏦 Bank Transfer</option>
                <option value="card">💳 Debit / Credit Card</option>
                <option value="wallet">👜 Other Wallet</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="doDeposit()" style="margin-bottom:10px">✅ Confirm Deposit</button>
        <button class="btn btn-outline" onclick="closeSheet('deposit')">Cancel</button>
    </div>
</div>

<!-- Withdraw Sheet -->
<div class="modal-overlay" id="withdrawSheet">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">⬆ Withdraw Funds</div>
        <div class="field-group">
            <div class="field-label">Amount (₹)</div>
            <input class="field-input" type="number" id="withdrawAmount" placeholder="Min ₹100" min="100">
        </div>
        <div class="chip-row" style="margin-bottom:16px">
            <button class="chip" onclick="setWdAmt(500, this)">₹500</button>
            <button class="chip" onclick="setWdAmt(1000, this)">₹1K</button>
            <button class="chip" onclick="setWdAmt(5000, this)">₹5K</button>
            <button class="chip" onclick="setWdAmt(10000, this)">₹10K</button>
        </div>
        <div class="field-group">
            <div class="field-label">UPI ID / Bank Account</div>
            <input class="field-input" type="text" id="withdrawDest" placeholder="e.g. name@upi or account number">
        </div>
        <p style="font-size:11px;color:var(--text-secondary);margin-bottom:14px">⏱ Withdrawals processed within 24 hours. Min ₹100.</p>
        <button class="btn btn-danger" onclick="doWithdraw()" style="margin-bottom:10px">Request Withdrawal</button>
        <button class="btn btn-outline" onclick="closeSheet('withdraw')">Cancel</button>
    </div>
</div>

<div class="app-toast" id="toast"></div>

<script type="module">
import { requireAuth, getUser, getBalance, setBalance, getTransactions, addTransaction, formatCurrency } from './js/user.js';
import { initAll, countUp, copyText, initReveal } from './js/enhancements.js';

if (!requireAuth('home.html')) throw new Error('Not logged in');
initAll();
initReveal();

const user = getUser();
let currentFilter = 'all';

// ── Render ───────────────────────────────
function render() {
    const bal = getBalance();
    const txs = getTransactions();

    // Balance with count-up animation
    const balEl = document.getElementById('balanceDisplay');
    const prevBal = parseFloat(balEl.textContent.replace(/[₹,]/g, '')) || 0;
    countUp(balEl, bal, 800, '₹', '');
    document.getElementById('uidDisplay').textContent = user.uid || '';

    // Wallet stats
    const totalWon  = txs.filter(t => t.type === 'win').reduce((s,t) => s + t.amount, 0);
    const totalDep  = txs.filter(t => t.type === 'deposit').reduce((s,t) => s + t.amount, 0);
    const totalBet  = txs.filter(t => t.type === 'bet').reduce((s,t) => s + t.amount, 0);
    countUp(document.getElementById('totalWon'), totalWon, 600, '₹', '');
    countUp(document.getElementById('totalDep'), totalDep, 600, '₹', '');
    countUp(document.getElementById('totalBet'), totalBet, 600, '₹', '');

    // Sparkline
    renderSparkline(txs);

    // Transaction list
    renderTxList(txs);

    document.getElementById('txCountLabel').textContent = txs.length + ' transactions';
}

// ── Sparkline ────────────────────────────
function renderSparkline(txs) {
    const sparkEl = document.getElementById('sparkline');
    const balances = txs.slice(0, 12).reverse().map(t => t.balance || 0);
    if (balances.length < 2) { sparkEl.innerHTML = ''; return; }
    const max = Math.max(...balances);
    const min = Math.min(...balances);
    const range = max - min || 1;
    const trend = balances[balances.length - 1] > balances[0];
    document.getElementById('balanceTrend').textContent = trend ? '▲ Trending up' : '▼ Trending down';
    sparkEl.innerHTML = balances.map((b, i) => {
        const pct = Math.max(8, ((b - min) / range) * 100);
        const up = i > 0 ? b >= balances[i-1] : true;
        return `<div class="spark-bar ${up ? 'up' : 'down'}" style="height:${pct}%"></div>`;
    }).join('');
}

// ── Transaction list ──────────────────────
function renderTxList(txs) {
    const filtered = currentFilter === 'all' ? txs : txs.filter(t => t.type === currentFilter);
    const list = document.getElementById('txList');
    if (!filtered.length) {
        list.innerHTML = `<div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No ${currentFilter === 'all' ? '' : currentFilter} transactions yet</div>
            <div class="empty-sub">Your transaction history will appear here once you start playing.</div>
        </div>`;
        return;
    }
    const icons  = { deposit:'💳', withdraw:'⬆', bet:'🎮', win:'🏆', bonus:'🎁' };
    const colors = { deposit:'#e8f4ff', withdraw:'#ffeef0', bet:'#f5f5f5', win:'#e8faf0', bonus:'#fff8ec' };
    list.innerHTML = filtered.map(tx => {
        const isCredit = ['deposit','bonus','win'].includes(tx.type);
        const date = new Date(tx.date).toLocaleDateString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        return `<div class="tx-row anim-fade-up">
            <div class="tx-icon" style="background:${colors[tx.type]||'#f0f0f0'}">${icons[tx.type]||'💰'}</div>
            <div class="tx-info">
                <div class="tx-title">${tx.note || tx.type}</div>
                <div class="tx-date">${date} · Bal: ${formatCurrency(tx.balance)}</div>
            </div>
            <div class="tx-amount ${isCredit ? 'credit' : 'debit'}">${isCredit ? '+' : '-'}${formatCurrency(Math.abs(tx.amount))}</div>
        </div>`;
    }).join('');
}

render();

// ── Filter ────────────────────────────────
window.setFilter = function(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.tx-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTxList(getTransactions());
};

// ── Toast ─────────────────────────────────
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Sheet ─────────────────────────────────
window.openSheet  = t => document.getElementById(t === 'deposit' ? 'depositSheet' : 'withdrawSheet').classList.add('open');
window.closeSheet = t => document.getElementById(t === 'deposit' ? 'depositSheet' : 'withdrawSheet').classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(el =>
    el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); })
);

// ── Chip selection ────────────────────────
function clearChips(row) { row.querySelectorAll('.chip').forEach(c => c.classList.remove('selected')); }
window.setDepAmt = (v, btn) => {
    document.getElementById('depositAmount').value = v;
    clearChips(btn.closest('.chip-row'));
    btn.classList.add('selected');
};
window.setWdAmt = (v, btn) => {
    document.getElementById('withdrawAmount').value = v;
    clearChips(btn.closest('.chip-row'));
    btn.classList.add('selected');
};

// ── Quick deposit ─────────────────────────
window.quickDeposit = function(amount, btn) {
    clearChips(btn.closest('.chip-row'));
    btn.classList.add('selected');
    setTimeout(() => btn.classList.remove('selected'), 1500);
    const bal = getBalance();
    setBalance(bal + amount);
    addTransaction('deposit', amount, `Quick deposit ₹${amount.toLocaleString('en-IN')}`);
    render();
    toast(`✅ ₹${amount.toLocaleString('en-IN')} deposited!`);
};

// ── Copy UID ──────────────────────────────
window.copyUID = () => copyText(user.uid || '', '✅ UID copied!');

// ── Deposit ───────────────────────────────
window.doDeposit = function() {
    const amount = parseFloat(document.getElementById('depositAmount').value);
    if (!amount || amount < 10) { toast('Minimum deposit is ₹10'); return; }
    if (amount > 100000) { toast('Maximum deposit is ₹1,00,000'); return; }
    const method = document.getElementById('depositMethod').value.toUpperCase();
    setBalance(getBalance() + amount);
    addTransaction('deposit', amount, `Deposit via ${method}`);
    closeSheet('deposit');
    document.getElementById('depositAmount').value = '';
    render();
    toast('✅ ₹' + amount.toLocaleString('en-IN') + ' deposited!');
};

// ── Withdraw ──────────────────────────────
window.doWithdraw = function() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    const dest   = document.getElementById('withdrawDest').value.trim();
    if (!amount || amount < 100) { toast('Minimum withdrawal is ₹100'); return; }
    if (!dest) { toast('Please enter UPI ID or account number'); return; }
    if (amount > getBalance()) { toast('Insufficient balance'); return; }
    setBalance(getBalance() - amount);
    addTransaction('withdraw', amount, 'Withdraw to ' + dest);
    closeSheet('withdraw');
    document.getElementById('withdrawAmount').value = '';
    document.getElementById('withdrawDest').value = '';
    render();
    toast('✅ Withdrawal request of ₹' + amount.toLocaleString('en-IN') + ' submitted!');
};
</script>
</body>
</html>
